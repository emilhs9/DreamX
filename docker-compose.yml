services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: launchpad
      POSTGRES_USER: launchpad
      POSTGRES_PASSWORD: change_me
    volumes:
      - launchpad_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchpad -d launchpad"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - launchpad_redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://launchpad:change_me@postgres:5432/launchpad
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - launchpad_uploads:/app/uploads
      - launchpad_deployments:/app/deployments
      - launchpad_tmp:/app/tmp
    ports:
      - "3000:3000"
    command: sh -c "npm run migrate && npm run seed && node server.js"

  frontend:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  launchpad_postgres:
  launchpad_redis:
  launchpad_uploads:
  launchpad_deployments:
  launchpad_tmp:
